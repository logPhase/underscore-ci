# Underscore full-repo report — copy to .github/workflows/underscore-full.yml
#
# On-demand (workflow_dispatch): analyzes the WHOLE repository — every journey,
# business flow, and chapter — and commits the single-file HTML report to an
# orphan `underscore-reports` branch (timestamped run dir + latest/).
#
# Unlike the PR workflow, an analysis failure always fails this run: there is
# no PR to fall back to a comment on, and a green no-op would be misleading.
#
# Secrets required:
#   UNDERSCORE_GHCR_USER / UNDERSCORE_GHCR_TOKEN — pull auth for the private
#     analysis image (the action does the docker login/pull itself)
#   INTENT_DRIFT_URL / INTENT_DRIFT_TOKEN — hosted analyzer (omit token for
#     structural-only)
#
# Optional repo variable:
#   UNDERSCORE_VIEWER_URL — base URL of the hosted static viewer (nginx serving
#     the underscore-reports branch). When set, the step summary links this run
#     and the report index. Leave unset to skip the links cleanly.
#
# Optional enrichment knob (set as a workflow/env var on the `uses` step below):
#   BPMN_MAX_JOURNEYS — cap BPMN diagramming to the top-N journeys by step count
#     (unset = diagram all discovered journeys). Bounds analyzer cost on big repos.
name: Underscore Full Report
on: workflow_dispatch

permissions:
  contents: write # push the report to the underscore-reports branch

# Serialize dispatches: overlapping runs would both commit on the same
# underscore-reports tip and the later push would be rejected (non-fast-forward).
concurrency:
  group: underscore-reports

jobs:
  underscore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — journey discovery walks the repo's git state
      - id: underscore
        uses: logPhase/underscore-ci@v1
        with:
          mode: full
          ghcr-username: ${{ secrets.UNDERSCORE_GHCR_USER }}
          ghcr-token: ${{ secrets.UNDERSCORE_GHCR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # INTENT_DRIFT_* are optional — omit them for a structural-only
          # report. In full mode enrichment adds BPMN business-flow diagrams
          # plus journey summaries (the PR-overview narrative is PR-mode-only).
          INTENT_DRIFT_URL: ${{ secrets.INTENT_DRIFT_URL }}
          INTENT_DRIFT_TOKEN: ${{ secrets.INTENT_DRIFT_TOKEN }}
          # Optional BPMN cost cap: diagram only the top-N journeys by step
          # count. Unset = all discovered journeys. e.g. BPMN_MAX_JOURNEYS: '20'
          # BPMN_MAX_JOURNEYS: '20'

      # Commit the single-file report to the orphan `underscore-reports`
      # branch: reports/<UTC timestamp>-run-<n>/underscore-report.html plus a
      # stable latest/underscore-report.html. Worktrees share the main
      # checkout's config, so the actions/checkout persisted credentials and
      # the git identity below apply — no extra token plumbing needed.
      - name: Publish report to underscore-reports branch
        env:
          # Base URL of the hosted static viewer (nginx serving the
          # underscore-reports branch). Empty when the repo variable is unset —
          # the link block below is then skipped cleanly.
          VIEWER_URL: ${{ vars.UNDERSCORE_VIEWER_URL }}
        run: |
          set -euo pipefail

          REPORT_FILE="${{ steps.underscore.outputs.report-file }}"
          if [[ -z "$REPORT_FILE" || ! -f "$REPORT_FILE" ]]; then
            echo "::error::report-file output missing — the analysis step produced no report"
            exit 1
          fi

          git config user.name "underscore-bot"
          git config user.email "bot@logphase.io"

          WORKTREE=/tmp/underscore-reports
          if git ls-remote --exit-code --heads origin underscore-reports >/dev/null; then
            git fetch origin "underscore-reports:underscore-reports"
            git worktree add "$WORKTREE" underscore-reports
          else
            # First run: create the orphan branch (git >= 2.42, ubuntu-latest).
            git worktree add --orphan -b underscore-reports "$WORKTREE"
            # An orphan worktree must start empty — drop anything inherited
            # from the main checkout's index.
            git -C "$WORKTREE" rm -rf --cached . >/dev/null 2>&1 || true
          fi

          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          DEST="reports/${STAMP}-run-${{ github.run_number }}"
          mkdir -p "$WORKTREE/$DEST" "$WORKTREE/latest"
          cp "$REPORT_FILE" "$WORKTREE/$DEST/underscore-report.html"
          cp "$REPORT_FILE" "$WORKTREE/latest/underscore-report.html"

          # Regenerate the branch landing page (index.html), listing every
          # reports/<stamp>-run-<n>/ entry newest-first plus a stable link to
          # latest/. This file is REQUIRED by the viewer: its docroot `index`
          # and its readiness probe both resolve "/" -> index.html, so without
          # it every viewer Pod stays NotReady and the Service serves nothing.
          # Regenerated each run so new reports appear without a redeploy.
          {
            cat <<'HTML_HEAD'
          <!doctype html>
          <meta charset="utf-8">
          <title>Underscore reports</title>
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <style>body{font:16px/1.6 system-ui,sans-serif;max-width:48rem;margin:8vh auto;padding:0 1.5rem;color:#1c1c28}h1{font-size:1.5rem}a{color:#2b5fff}ul{padding-left:1.2rem}li{margin:.35em 0}.latest{margin:1rem 0 2rem}</style>
          <h1>Underscore reports</h1>
          <p class="latest">Newest report: <a href="latest/underscore-report.html">latest/underscore-report.html</a></p>
          <ul>
          HTML_HEAD
            # Stamps are UTC YYYYmmdd-HHMMSS, so a reverse lexical sort is also
            # reverse-chronological (newest first).
            for d in $(ls -1 "$WORKTREE/reports" 2>/dev/null | sort -r); do
              [ -f "$WORKTREE/reports/$d/underscore-report.html" ] || continue
              printf '          <li><a href="reports/%s/underscore-report.html">%s</a></li>\n' "$d" "$d"
            done
            cat <<'HTML_TAIL'
          </ul>
          HTML_TAIL
          } > "$WORKTREE/index.html"

          git -C "$WORKTREE" add -A
          git -C "$WORKTREE" commit -m "underscore full report ${STAMP} (run ${{ github.run_number }})"
          git -C "$WORKTREE" push origin underscore-reports

          # Link to the hosted static viewer, when configured. UNDERSCORE_VIEWER_URL
          # is the base URL of the nginx viewer that serves this branch's content;
          # set it as a repo variable after deploying the viewer. Skipped cleanly
          # when unset so the branch commit above is never affected.
          if [[ -n "${VIEWER_URL:-}" ]]; then
            BASE="${VIEWER_URL%/}"
            {
              echo "## Underscore full-repo report — hosted viewer"
              echo ""
              echo "- This run: ${BASE}/${DEST}/underscore-report.html"
              echo "- All reports: ${BASE}/"
            } >>"$GITHUB_STEP_SUMMARY"
          fi
