# Underscore PR report — copy to .github/workflows/underscore-pr.yml
#
# Secrets required:
#   INTENT_DRIFT_URL / INTENT_DRIFT_TOKEN  — hosted analyzer (omit token for structural-only)
#   UNDERSCORE_GHCR_USER / UNDERSCORE_GHCR_TOKEN — pull auth for the private analysis image
#     (the action does the docker login/pull itself — no separate login step)
name: Underscore PR Report
on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  underscore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — analysis diffs base/head via git worktrees
      - id: underscore
        uses: logphase/underscore-ci@v1
        with:
          ghcr-username: ${{ secrets.UNDERSCORE_GHCR_USER }}
          ghcr-token: ${{ secrets.UNDERSCORE_GHCR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INTENT_DRIFT_URL: ${{ secrets.INTENT_DRIFT_URL }}
          INTENT_DRIFT_TOKEN: ${{ secrets.INTENT_DRIFT_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: steps.underscore.outputs.report-file != ''
        with:
          name: underscore-report
          path: ${{ steps.underscore.outputs.report-file }}

