name: 'Underscore PR Analysis'
description: >-
  Runs Underscore analysis on the checked-out repository and publishes an
  interactive static report (journeys, impact overlay, BPMN, chapter
  deep-dives). Default mode analyzes the pull request diff; mode 'full'
  produces an on-demand whole-repo report. Requires actions/checkout with
  fetch-depth: 0.
author: 'logPhase'

branding:
  icon: 'map'
  color: 'purple'

# Composite action, NOT a `runs.using: docker` container action: GitHub-hosted
# runners pull container-action images during "Set up job", BEFORE any workflow
# step can `docker login`, so a private GHCR image is impossible in that mode
# (actions/runner#1919). Doing login + pull + run ourselves keeps the image
# private (per-client pull tokens) while working on stock hosted runners.

inputs:
  mode:
    description: >-
      Analysis mode. 'auto' (default) picks 'pr' on a pull_request event and
      'full' otherwise (e.g. workflow_dispatch) — so one workflow serves both.
      'pr' analyzes the PR diff (only the journeys it touches) and posts a PR
      comment. 'full' produces a whole-repo report; an analysis failure always
      fails the step in full mode (no PR to comment on, so a green no-op would
      be misleading).
    required: false
    default: 'auto'
  publish:
    description: >-
      Where to publish the report. 'none' (default) just exposes the
      report-file / publish-dir outputs for the caller to handle. 'branch'
      commits the report to the reports-branch (per-run dir for full mode,
      one dir per PR for pr mode), maintains runs.json for the hosted viewer,
      and drops the branded landing page — no client-side plumbing needed.
    required: false
    default: 'none'
  reports-branch:
    description: "Orphan branch the 'branch' publish mode commits reports to."
    required: false
    default: 'underscore-reports'
  findings:
    description: >-
      Correctness findings — the changed methods audited against the repo's
      institutional knowledge by a dedicated agent (per-PR ledger, inline PR
      review comments). 'off' (default): skipped, zero agent spend. 'on':
      runs in pr mode when INTENT_DRIFT_TOKEN is set.
    required: false
    default: 'off'
  reports-repo:
    description: >-
      OPTIONAL dedicated reports repository ('owner/name'). When set together
      with reports-deploy-key, reports push THERE (branch = reports-branch)
      instead of a branch of the analyzed repo — keeps report data out of the
      code repo (no "recent pushes" PR-prompt banner for the team). One
      reports repo can serve a whole platform: use the source repo's name as
      reports-branch.
    required: false
    default: ''
  reports-deploy-key:
    description: >-
      SSH private key with write access to reports-repo (a deploy key). Pass
      a secret; required only when reports-repo is set.
    required: false
    default: ''
  workspace:
    description: >-
      Workspace/domain name that groups repos for shared cross-repo context
      (memory stores + knowledge scope). Every repo run with the SAME workspace
      name is auto-attached to it — no UI, no manual grouping. Defaults to the
      GitHub org, so all repos in one org group together; override per repo to
      curate domains (e.g. 'upcover').
    required: false
    default: ''
  viewer-url:
    description: >-
      Base URL of the hosted viewer (e.g. https://host/underscore). When set,
      each run's summary links to its report there. Optional.
    required: false
    default: ''
  delivery:
    description: >-
      Report delivery mode. 'artifact' (default) emits a single-file HTML
      report for actions/upload-artifact via the report-file output.
      'pages' leaves a static publish dir (publish-dir output) for a
      GitHub Pages deploy step under pr-<number>/.
    required: false
    default: 'artifact'
  sln:
    description: >-
      Repo-relative path to the .sln/.slnx to analyze. Only needed when the
      repository contains more than one solution.
    required: false
    default: ''
  lang:
    description: "Language of the repository: csharp | java | python."
    required: false
    default: 'csharp'
  fail-on-error:
    description: >-
      When 'true', an analysis failure fails the workflow. Default 'false':
      the action posts a failure comment on the PR and exits green so the
      client pipeline is never blocked by us.
    required: false
    default: 'false'
  image:
    description: >-
      Analysis image to run. Override for dev/dogfood builds
      (e.g. ghcr.io/logphase/underscore-ci:dev from scripts/build-image.sh).
    required: false
    default: 'ghcr.io/logphase/underscore-ci:v2'
  ghcr-username:
    description: >-
      Username for ghcr.io pull auth (the private analysis image). Any
      non-empty value works with a PAT-style pull token.
    required: false
    default: ''
  ghcr-token:
    description: >-
      Pull token for the private analysis image (we issue it). Omit only if
      the image input points at a registry the runner can reach anonymously.
    required: false
    default: ''

outputs:
  skipped:
    description: >-
      'true' when the PR changed no source files for the selected language
      (infrastructure-only PR) and analysis was skipped cleanly; empty
      otherwise.
    value: ${{ steps.analyze.outputs.skipped }}
  report-file:
    description: >-
      Workspace-relative path to the single-file HTML report
      (.underscore-report/underscore-report.html). Empty in pages mode.
    value: ${{ steps.analyze.outputs.report-file }}
  publish-dir:
    description: >-
      Workspace-relative directory containing the static report
      (.underscore-report). Feed this to a Pages deploy step with
      destination_dir pr-<number>/.
    value: ${{ steps.analyze.outputs.publish-dir }}
  pr-number:
    description: 'The pull request number the report was generated for.'
    value: ${{ steps.analyze.outputs.pr-number }}

runs:
  using: 'composite'
  steps:
    - name: Pull analysis image
      shell: bash
      env:
        UNDERSCORE_IMAGE: ${{ inputs.image }}
        GHCR_USERNAME: ${{ inputs.ghcr-username }}
        GHCR_TOKEN: ${{ inputs.ghcr-token }}
      run: |
        if [[ -n "$GHCR_TOKEN" ]]; then
          echo "$GHCR_TOKEN" | docker login ghcr.io \
            -u "${GHCR_USERNAME:-x-access-token}" --password-stdin
        fi
        docker pull "$UNDERSCORE_IMAGE"

    - name: Run Underscore PR analysis
      id: analyze
      shell: bash
      env:
        UNDERSCORE_IMAGE: ${{ inputs.image }}
        MODE: ${{ inputs.mode }}
        FINDINGS: ${{ inputs.findings }}
        VIEWER_URL: ${{ inputs.viewer-url }}
        WORKSPACE: ${{ inputs.workspace }}
        DELIVERY: ${{ inputs.delivery }}
        SLN: ${{ inputs.sln }}
        UNDERSCORE_LANG: ${{ inputs.lang }}
        FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      # Recreates the mounts/env a `runs.using: docker` container action gets:
      # workspace at /github/workspace, the event payload, and the GITHUB_OUTPUT
      # / GITHUB_STEP_SUMMARY files so entrypoint.sh works unchanged.
      # GITHUB_TOKEN / GH_TOKEN / INTENT_DRIFT_* / BPMN_MAX_JOURNEYS are
      # inherited from the `env:` block on the calling workflow step and passed
      # through by name (BPMN_MAX_JOURNEYS is an optional full-mode cost cap).
      run: |
        # Resolve 'auto' here so any image (incl. older ones) receives a
        # concrete pr|full — the container never needs to know about 'auto'.
        if [[ "$MODE" == "auto" ]]; then
          if [[ "${GITHUB_EVENT_NAME:-}" == "pull_request" ]]; then MODE=pr; else MODE=full; fi
        fi
        echo "Underscore mode: $MODE (event: ${GITHUB_EVENT_NAME:-n/a})"
        # Stable per-repo analyzer id — scopes the analyzer graph, BPMN cache, and
        # per-repo memory store. WITHOUT this it derives from the checkout dir name
        # ("workspace"), so every repo in one analyzer workspace would collide into
        # a single "workspace" scope. Default to the repo name; a caller may
        # override by setting INTENT_DRIFT_REPO_ID on the step env.
        export INTENT_DRIFT_REPO_ID="${INTENT_DRIFT_REPO_ID:-${GITHUB_REPOSITORY##*/}}"
        echo "Underscore analyzer repo_id: $INTENT_DRIFT_REPO_ID"
        # Workspace/domain grouping: explicit input wins, else the GitHub org —
        # so repos in one org share cross-repo memory + knowledge context.
        export INTENT_DRIFT_WORKSPACE="${INTENT_DRIFT_WORKSPACE:-${WORKSPACE:-${GITHUB_REPOSITORY%%/*}}}"
        echo "Underscore workspace: $INTENT_DRIFT_WORKSPACE"
        docker run --rm \
          --workdir /github/workspace \
          -v "$GITHUB_WORKSPACE:/github/workspace" \
          -v "$GITHUB_EVENT_PATH:/github/workflow/event.json:ro" \
          -v "$GITHUB_OUTPUT:/github/output" \
          -v "$GITHUB_STEP_SUMMARY:/github/step-summary" \
          -e GITHUB_WORKSPACE=/github/workspace \
          -e GITHUB_EVENT_PATH=/github/workflow/event.json \
          -e GITHUB_OUTPUT=/github/output \
          -e GITHUB_STEP_SUMMARY=/github/step-summary \
          -e GITHUB_REPOSITORY \
          -e GITHUB_SERVER_URL \
          -e GITHUB_RUN_ID \
          -e GITHUB_EVENT_NAME \
          -e GITHUB_TOKEN \
          -e GH_TOKEN \
          -e INTENT_DRIFT_URL \
          -e INTENT_DRIFT_TOKEN \
          -e INTENT_DRIFT_REPO_ID \
          -e INTENT_DRIFT_WORKSPACE \
          -e BPMN_MAX_JOURNEYS \
          -e MODE \
          -e FINDINGS \
          -e VIEWER_URL \
          -e DELIVERY \
          -e SLN \
          -e UNDERSCORE_LANG \
          -e FAIL_ON_ERROR \
          "$UNDERSCORE_IMAGE"

    # All the reports-branch plumbing lives HERE, in the action — so a client
    # workflow never hand-rolls git worktrees or runs.json. Gated on
    # publish=branch; runs on the runner (has git + the checkout's push creds).
    - name: Publish report to reports branch
      if: inputs.publish == 'branch' && steps.analyze.outputs.report-file != ''
      shell: bash
      env:
        REPORTS_BRANCH: ${{ inputs.reports-branch }}
        REPORTS_REPO: ${{ inputs.reports-repo }}
        REPORTS_DEPLOY_KEY: ${{ inputs.reports-deploy-key }}
        VIEWER_URL: ${{ inputs.viewer-url }}
        MODE_INPUT: ${{ inputs.mode }}
        REPORT_FILE: ${{ steps.analyze.outputs.report-file }}
        PUBLISH_DIR: ${{ steps.analyze.outputs.publish-dir }}
        REPO_SLUG: ${{ github.repository }}
        RUN_NUMBER: ${{ github.run_number }}
        ACTOR: ${{ github.actor }}
        REF_NAME: ${{ github.ref_name }}
        HEAD_SHA: ${{ github.sha }}
        # PR context (empty off a pull_request) — via env so an attacker-set PR
        # title can never inject shell.
        EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        GH_TOKEN: ${{ github.token }}
      run: |
        bash "$GITHUB_ACTION_PATH/scripts/publish-report.sh"
