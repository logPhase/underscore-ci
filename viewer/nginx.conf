# Underscore hosted report VIEWER — nginx server block.
#
# Pure static hosting of the `underscore-reports` branch content. No backend,
# no IP: every report is a self-contained single-file HTML (inline JS/CSS)
# produced by the analysis run and committed to the branch. This process only
# serves those files.
#
# Content layout it serves (as committed to the branch by the CI publish step):
#   index.html                                   run index (regenerated each run)
#   latest/underscore-report.html                stable pointer, OVERWRITTEN each run
#   reports/<UTC-stamp>-run-<n>/underscore-report.html   immutable per-run report
#
# --- The three gotchas this config is built around -----------------------------
#
# GOTCHA 1 — git-sync serves through a SYMLINK, and it swaps atomically.
#   The git-sync sidecar does not write the branch worktree directly at the
#   docroot; it maintains `<root>/rev-<sha>/` dirs and flips a symlink to the
#   live one. We mount the shared volume at /usr/share/nginx and let git-sync
#   own the `html` link (`--root=/usr/share/nginx --link=html`), so the docroot
#   /usr/share/nginx/html is itself the symlink. Therefore:
#     * open_file_cache is left OFF — caching the resolved fd/symlink would
#       pin nginx to the OLD rev after a swap and serve stale reports forever.
#     * disable_symlinks is left at the default (off) — turning it on would
#       make nginx refuse to traverse git-sync's symlink and 404 everything.
#
# GOTCHA 2 — `latest/` is MUTABLE, `reports/<stamp>/` is IMMUTABLE.
#   reports/<stamp>/ paths never change content, so they get a 1-year immutable
#   cache. But index.html AND latest/ are overwritten on every run — caching
#   them like the per-run reports would freeze the viewer on an old report.
#   They get `no-cache` (revalidate every time). Getting this wrong is the
#   classic "why is the report stale" bug.
#
# GOTCHA 3 — add_header does NOT merge across levels; a child add_header wipes
#   all inherited ones. So Cache-Control is chosen with a `map` and every header
#   (security + cache) is emitted from a SINGLE add_header block at server level.
#   No location adds its own header, so nothing is silently dropped. The friendly
#   404 sets its content type via default_type (not add_header) for the same
#   reason.

# GOTCHA 2: pick Cache-Control by path. Immutable per-run reports cache hard;
# the mutable entrypoints (index.html, latest/) must always revalidate.
map $uri $underscore_cache_control {
    default                 "public, max-age=300";
    ~^/reports/             "public, max-age=31536000, immutable";
    ~^/latest/              "no-cache";
    "/index.html"           "no-cache";
    "/"                     "no-cache";
}

server {
    # Unprivileged port so the container can run as non-root in K8s.
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    # GOTCHA 1: docroot IS the git-sync symlink. Do NOT enable open_file_cache
    # here or anywhere — the symlink must be re-resolved on every request so an
    # atomic git-sync swap is picked up immediately.
    root  /usr/share/nginx/html;
    index index.html;

    # No directory listings — reports are addressed by exact path only.
    autoindex off;

    # Reports are ~6-8 MB of inline HTML; gzip pays for itself on the wire.
    # (Immutable cache means each client pays the transfer at most once.)
    gzip            on;
    # text/html is always gzipped when gzip is on; only the extra types listed.
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary       on;

    sendfile    on;
    tcp_nopush  on;

    # GOTCHA 3: the ONLY add_header block. Security headers + the path-derived
    # Cache-Control, all `always` so they apply to error responses too. Because
    # no location overrides add_header, these are never dropped.
    add_header X-Content-Type-Options nosniff                    always;
    add_header X-Frame-Options        SAMEORIGIN                 always;
    add_header Referrer-Policy        no-referrer                always;
    add_header Cache-Control          $underscore_cache_control  always;

    # Bare "/" -> index.html (via `index`); unknown paths -> friendly 404.
    # A request for a directory without index.html would otherwise 403; fold
    # that into the same 404 so we never leak a forbidden/listing response.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 403 = @notfound;
    error_page 404     @notfound;

    location @notfound {
        internal;
        default_type text/html;   # not add_header — see GOTCHA 3
        return 404 '<!doctype html><meta charset="utf-8"><title>Not found - Underscore</title><style>body{font:16px/1.6 system-ui,sans-serif;max-width:34rem;margin:15vh auto;padding:0 1.5rem;color:#1c1c28}code{background:#f2f2f7;padding:.1em .35em;border-radius:4px}</style><h1>404 - report not found</h1><p>No report at this path. Start at <a href="/">the report index</a>, or open the newest run at <a href="/latest/underscore-report.html"><code>/latest/underscore-report.html</code></a>.</p>';
    }

    # Liveness/readiness target. Serving / with 200 means git-sync has populated
    # the docroot and nginx can resolve the symlink; before the first sync this
    # is correctly not-ready. Kept out of the access log to avoid probe spam.
    location = / {
        access_log off;
        try_files /index.html =404;
    }
}
