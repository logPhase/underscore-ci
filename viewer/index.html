<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>logPhase · Underscore — analysis sessions</title>
<style>
  :root{
    --ink:#0C0F1D; --panel:#141A2E; --panel-2:#1B2238; --line:#2A3350; --line-soft:#1E2540;
    --mist:#7E88A3; --dim:#556084; --paper:#EAEEF9; --signal:#8B7DFF; --live:#34E2C4;
    --amber:#F5B950; --rose:#F0709B; --sky:#7EB6FF;
    --mono:ui-monospace,"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--ink); color:var(--paper); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    background-image:
      linear-gradient(var(--line-soft) 1px,transparent 1px),
      linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
    background-size:56px 56px; background-position:center -1px; background-attachment:fixed;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(120% 90% at 50% 0%, transparent 0%, rgba(12,15,29,.78) 50%, var(--ink) 100%);
  }
  .wrap{position:relative; z-index:1; max-width:880px; margin:0 auto; padding:0 20px}

  /* ---- top bar ---- */
  .bar{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(10px);
    background:rgba(12,15,29,.72); border-bottom:1px solid var(--line);
  }
  .bar .wrap{display:flex; align-items:center; gap:14px; height:52px}
  .mark{font-family:var(--mono); font-weight:700; font-size:16px; letter-spacing:-.02em; color:var(--paper); text-decoration:none}
  .mark b{color:var(--signal); font-weight:700}
  .cursor{color:var(--live); font-weight:400}
  .bar .tag{font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; color:var(--mist); text-transform:uppercase; padding:3px 8px; border:1px solid var(--line); border-radius:999px}
  .bar .spacer{flex:1}
  .bar .crumb{font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:.06em}

  /* ---- board head ---- */
  .head{padding:34px 0 6px}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--signal); margin:0 0 10px}
  .head h1{font-family:var(--mono); font-weight:700; letter-spacing:-.02em; font-size:24px; margin:0 0 10px}
  .sum{font-family:var(--mono); font-size:12.5px; color:var(--mist); display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:0 0 6px}
  .sum b{color:var(--paper); font-weight:600}
  .sum .dot{color:var(--dim)}
  .live-dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--live);
    box-shadow:0 0 0 0 rgba(52,226,196,.55); animation:ping 2.4s ease-out infinite}
  .note{font-family:var(--mono); font-size:11.5px; color:var(--amber); margin:6px 0 0}

  /* ---- filter chips (repos) ---- */
  .filters{display:flex; gap:8px; margin:16px 0 12px; flex-wrap:wrap}
  .fchip{font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
    padding:4px 11px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--mist)}
  .fchip:hover{border-color:var(--mist)}
  .fchip.on{color:var(--ink); background:var(--paper); border-color:var(--paper); font-weight:700}
  .fchip .n{opacity:.6; margin-left:4px}

  /* ---- session list ---- */
  .board{border:1px solid var(--line); border-radius:12px; overflow:hidden; background:rgba(20,26,46,.55); margin-bottom:26px}
  .s{
    display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit;
    padding:11px 16px; border-bottom:1px solid var(--line-soft); position:relative;
    transition:background .15s;
  }
  .s:last-child{border-bottom:0}
  .s:hover{background:var(--panel-2)}
  .s.latest{background:linear-gradient(90deg, rgba(52,226,196,.06), transparent 40%)}
  .s.latest::before{content:""; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--live)}
  .chip{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; white-space:nowrap;
    padding:2px 8px; border-radius:999px; border:1px solid; flex:none}
  .chip.repo{border-color:color-mix(in srgb, var(--c) 55%, transparent); color:var(--c);
    min-width:78px; text-align:center}
  .sid{font-family:var(--mono); font-size:12px; font-weight:600; color:var(--paper); white-space:nowrap; flex:none; min-width:64px}
  .sid.full{color:var(--mist); font-weight:500}
  .t{flex:1; min-width:0}
  .title{font-size:13.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#CDD5E8}
  .title .fulltag{color:var(--dim); font-style:italic}
  .counts{font-family:var(--mono); font-size:11px; color:var(--dim); white-space:nowrap; flex:none}
  .fnd{font-family:var(--mono); font-size:10px; letter-spacing:.06em; white-space:nowrap; flex:none;
    color:var(--amber); border:1px solid color-mix(in srgb, var(--amber) 45%, transparent);
    border-radius:999px; padding:2px 8px}
  .when{font-family:var(--mono); font-size:11px; color:var(--mist); white-space:nowrap; flex:none; min-width:64px; text-align:right}
  .prlink{font-family:var(--mono); font-size:10px; letter-spacing:.06em; white-space:nowrap; flex:none;
    color:var(--sky); border:1px solid color-mix(in srgb, var(--sky) 40%, transparent); border-radius:999px; padding:2px 8px; cursor:alias}
  .prlink:hover{color:var(--paper); border-color:var(--sky)}
  .arw{font-family:var(--mono); color:var(--dim); flex:none; transition:transform .2s, color .2s}
  .s:hover .arw{transform:translateX(3px); color:var(--signal)}
  .ltag{font-family:var(--mono); font-size:9px; letter-spacing:.16em; color:var(--live); flex:none}

  .msg{font-family:var(--mono); font-size:13px; color:var(--mist); padding:40px 20px; text-align:center}
  .msg b{color:var(--paper); font-weight:600}

  footer{margin:8px 0 40px; font-family:var(--mono); font-size:11px; color:var(--dim); display:flex; gap:10px}
  footer .spacer{flex:1}

  /* entrance: one quiet stagger, capped */
  .s{opacity:0; transform:translateY(6px); animation:in .4s cubic-bezier(.2,.7,.2,1) forwards}
  .s:nth-child(1){animation-delay:.02s}.s:nth-child(2){animation-delay:.06s}.s:nth-child(3){animation-delay:.1s}
  .s:nth-child(4){animation-delay:.14s}.s:nth-child(5){animation-delay:.18s}.s:nth-child(6){animation-delay:.22s}
  .s:nth-child(n+7){animation-delay:.26s}
  @keyframes in{to{opacity:1; transform:none}}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(52,226,196,.55)}70%,100%{box-shadow:0 0 0 7px rgba(52,226,196,0)}}

  @media (max-width:700px){
    .counts{display:none}
    .sid{min-width:0}
    .when{min-width:0}
    .chip.repo{padding:2px 6px}
  }
  @media (prefers-reduced-motion:reduce){
    .s{opacity:1; transform:none; animation:none}
    .live-dot{animation:none; box-shadow:none}
  }
</style>
</head>
<body>
  <header class="bar">
    <div class="wrap">
      <a class="mark" href="./">log<b>Phase</b><span class="cursor" id="cur">_</span></a>
      <span class="tag">Underscore</span>
      <span class="spacer"></span>
      <span class="crumb">analysis sessions</span>
    </div>
  </header>

  <main class="wrap">
    <section class="head">
      <p class="eyebrow" id="eyebrow">Analysis sessions</p>
      <h1>Every run, one board.</h1>
      <p class="sum" id="sum"></p>
      <div id="notes"></div>
    </section>

    <div class="filters" id="filters" hidden></div>

    <div class="board" id="board">
      <div class="msg">Loading sessions…</div>
    </div>

    <footer>
      <span>logPhase · Underscore</span>
      <span class="spacer"></span>
      <span id="foot-src"></span>
    </footer>
  </main>

<script>
(function(){
  "use strict";
  // Blinking cursor (reduced-motion aware) — the one bit of brand motion.
  if(!matchMedia("(prefers-reduced-motion: reduce)").matches){
    var cur=document.getElementById("cur"), on=true;
    setInterval(function(){ on=!on; cur.style.opacity=on?1:.15; }, 560);
  }

  var ACCENTS=["#8B7DFF","#34E2C4","#F5B950","#F0709B","#7EB6FF","#B5E27A"];

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function joinUrl(base,path){ return String(base||"./").replace(/\/+$/,"")+"/"+String(path||"").replace(/^\/+/,""); }
  function isoFromStamp(st){
    if(!st||String(st).length<15) return null;
    st=String(st);
    return st.slice(0,4)+"-"+st.slice(4,6)+"-"+st.slice(6,8)+"T"+st.slice(9,11)+":"+st.slice(11,13)+":"+st.slice(13,15)+"Z";
  }
  function rel(iso){
    if(!iso) return "";
    var t=Date.parse(iso); if(isNaN(t)) return iso;
    var s=(Date.now()-t)/1000;
    if(s<60) return "just now";
    var m=s/60; if(m<60) return Math.round(m)+"m ago";
    var h=m/60; if(h<24) return Math.round(h)+"h ago";
    var d=h/24; if(d<30) return Math.round(d)+"d ago";
    return new Date(t).toISOString().slice(0,10);
  }

  // Sources: ./viewers.json ([{name, href}]) when the deployment ships one —
  // this page then AGGREGATES every source's runs.json into ONE board.
  // Absent (single-repo deployments, file://) → just ./runs.json as before.
  fetch("./viewers.json",{cache:"no-store"})
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .catch(function(){ return null; })
    .then(function(vs){
      var sources=(Array.isArray(vs)&&vs.length)
        ? vs.map(function(v,i){ return {name:String(v.name||("repo "+(i+1))), href:String(v.href||"./"), i:i}; })
        : [{name:null, href:"./", i:0}];
      return Promise.all(sources.map(function(src){
        return fetch(joinUrl(src.href,"runs.json"),{cache:"no-store"})
          .then(function(r){ if(!r.ok) throw 0; return r.json(); })
          .then(function(runs){ return {src:src, runs:Array.isArray(runs)?runs:[]}; })
          .catch(function(){ return {src:src, failed:true, runs:[]}; });
      }));
    })
    .then(render)
    .catch(function(){ fail(); });

  function fail(){
    document.getElementById("board").innerHTML=
      '<div class="msg"><b>Session list unavailable.</b> No runs.json yet — it is written by the next Underscore run.</div>';
  }

  var ALL=[], SOURCES=[], FILTER=null;

  function render(loaded){
    SOURCES=loaded.map(function(l){ return l.src; });
    var failedNames=loaded.filter(function(l){ return l.failed; }).map(function(l){ return l.src.name||"sessions"; });
    ALL=[];
    loaded.forEach(function(l){
      l.runs.forEach(function(r){
        if(!r.date) r.date=isoFromStamp(r.stamp);
        r._src=l.src;
        ALL.push(r);
      });
    });
    ALL.sort(function(a,b){ return String(b.date||"").localeCompare(String(a.date||"")); });

    // summary strip
    var multi=SOURCES.length>1;
    var repoNames={}; ALL.forEach(function(r){ repoNames[srcLabel(r)]=1; });
    var nRepos=Object.keys(repoNames).length;
    var latest=ALL[0];
    document.getElementById("sum").innerHTML = ALL.length
      ? '<b>'+ALL.length+'</b>&nbsp;session'+(ALL.length===1?'':'s')
        +(multi||nRepos>1 ? '<span class="dot">·</span><b>'+nRepos+'</b>&nbsp;repositor'+(nRepos===1?'y':'ies') : '')
        +'<span class="dot">·</span><span class="live-dot"></span>last run <b>'+esc(rel(latest.date))+'</b>'
      : '';
    if(multi){ document.getElementById("eyebrow").textContent="Analysis sessions · all repositories"; }

    // failed sources — a quiet line, never an empty box
    document.getElementById("notes").innerHTML =
      failedNames.map(function(n){ return '<p class="note">'+esc(n)+' sessions unavailable right now.</p>'; }).join("");

    // repo filter chips (only when there is something to filter)
    var fl=document.getElementById("filters");
    if(multi && ALL.length){
      var counts={};
      ALL.forEach(function(r){ var k=srcLabel(r); counts[k]=(counts[k]||0)+1; });
      fl.hidden=false;
      fl.innerHTML='<button class="fchip on" data-k="">All<span class="n">'+ALL.length+'</span></button>'+
        SOURCES.map(function(s){
          var k=s.name||""; if(!counts[k]) return "";
          return '<button class="fchip" data-k="'+esc(k)+'">'+esc(k)+'<span class="n">'+counts[k]+'</span></button>';
        }).join("");
      fl.addEventListener("click",function(e){
        var b=e.target.closest(".fchip"); if(!b) return;
        FILTER=b.getAttribute("data-k")||null;
        [].forEach.call(fl.querySelectorAll(".fchip"),function(x){ x.classList.toggle("on",x===b); });
        list();
      });
    }
    list();
    document.getElementById("foot-src").textContent = multi ? "aggregated across "+SOURCES.length+" repositories" : "";
  }

  function srcLabel(r){
    if(r._src && r._src.name) return r._src.name;
    if(r.project) return String(r.project);
    if(r.repo) return String(r.repo).split("/").pop();
    return "repo";
  }
  function accent(r){ return ACCENTS[(r._src?r._src.i:0)%ACCENTS.length]; }

  function counts(r){
    // zeros are silence, not information — a config-only PR just shows no counts
    var parts=[];
    if(r.journeys>0) parts.push(r.journeys+" journey"+(r.journeys===1?"":"s"));
    if(r.bpmn>0) parts.push(r.bpmn+" flow"+(r.bpmn===1?"":"s"));
    return parts.join(" · ");
  }

  function row(r, isLatest){
    var href=joinUrl(r._src?r._src.href:"./", String(r.dir||"")+"/underscore-report.html");
    var id=esc(r.id||("run-"+r.run));
    var isPr=!!r.pr;
    var title=isPr
      ? esc(r.prTitle||("Pull request #"+r.pr))
      : 'Whole-repo report <span class="fulltag">· '+esc(r.ref||"main")+'</span>';
    var abs=esc(r.date||"");
    var multi=SOURCES.length>1;
    return '<a class="s'+(isLatest?' latest':'')+'" href="'+esc(href)+'">'+
      (multi?'<span class="chip repo" style="--c:'+accent(r)+'">'+esc(srcLabel(r))+'</span>':'')+
      '<span class="sid'+(isPr?'':' full')+'">'+id+'</span>'+
      '<div class="t"><div class="title" title="'+(isPr?esc(r.prTitle||""):"whole-repo report")+'">'+title+'</div></div>'+
      (isLatest?'<span class="ltag">LATEST</span>':'')+
      (r.findings>0?'<span class="fnd">'+r.findings+' finding'+(r.findings===1?'':'s')+'</span>':'')+
      '<span class="counts">'+esc(counts(r))+'</span>'+
      // Jump to the pull request itself — a link INSIDE the row link, so it
      // must stop propagation and open in a new tab.
      (isPr&&r.repo?'<span class="prlink" data-pr-url="https://github.com/'+esc(r.repo)+'/pull/'+esc(String(r.pr))+'" title="Open pull request #'+esc(String(r.pr))+' on GitHub">PR ↗</span>':'')+
      '<span class="when" title="'+abs+' UTC">'+esc(rel(r.date))+'</span>'+
      '<span class="arw">→</span>'+
    '</a>';
  }

  function list(){
    var rows=FILTER?ALL.filter(function(r){ return srcLabel(r)===FILTER; }):ALL;
    var board=document.getElementById("board");
    if(!rows.length){
      board.innerHTML='<div class="msg"><b>No sessions yet.</b> Open a pull request — Underscore analyzes it automatically and the report lands here.</div>';
      return;
    }
    var latestId=ALL.length?ALL[0]:null;
    board.innerHTML=rows.map(function(r){ return row(r, r===latestId); }).join("");
    // PR jump chips live inside the row <a> — intercept so they open GitHub
    // in a new tab instead of following the report link.
    board.querySelectorAll(".prlink").forEach(function(el){
      el.addEventListener("click", function(ev){
        ev.preventDefault(); ev.stopPropagation();
        window.open(el.getAttribute("data-pr-url"), "_blank", "noopener");
      });
    });
  }
})();
</script>
</body>
</html>
