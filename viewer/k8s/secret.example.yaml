# TEMPLATE ONLY — do NOT commit real credentials.
#
# git-sync authenticates to the private repo apcoa-tech/iris-vas over HTTPS basic auth.
# GITSYNC_USERNAME = the GitHub username (or a machine/service account name)
# GITSYNC_PASSWORD = a fine-grained PAT with ONLY "Contents: Read-only" on apcoa-tech/iris-vas.
#
# Create it out-of-band instead of applying this file with real values:
#
#   kubectl create secret generic underscore-reports-git \
#     --namespace <ns> \
#     --from-literal=GITSYNC_USERNAME='<github-username>' \
#     --from-literal=GITSYNC_PASSWORD='<read-only-PAT>'
#
# The stringData below is a placeholder so `kubectl apply --dry-run` validates the shape.
apiVersion: v1
kind: Secret
metadata:
  name: underscore-reports-git
  labels:
    app: underscore-viewer
type: Opaque
stringData:
  GITSYNC_USERNAME: "REPLACE_ME_github_username"
  GITSYNC_PASSWORD: "REPLACE_ME_read_only_PAT"
---
# Ask AI relay credential — an nginx include snippet, NOT a bare token, so the
# ConfigMap needs no templating. Create with a real analyzer token:
#   printf 'proxy_set_header Authorization "Bearer %s";\n' "$ANALYZER_TOKEN" > ask-token.conf
#   kubectl create secret generic underscore-viewer-ask -n iris --from-file=ask-token.conf
#   rm ask-token.conf
apiVersion: v1
kind: Secret
metadata:
  name: underscore-viewer-ask
type: Opaque
stringData:
  ask-token.conf: |
    proxy_set_header Authorization "Bearer idk_REPLACE_ME";
