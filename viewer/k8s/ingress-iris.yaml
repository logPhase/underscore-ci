# GENERATED from ingress.yaml for the apcoa-tech/iris repo's reports
# (host path /underscore-iris). Regenerate rather than hand-edit:
# see the transform in the repo history.
# Exposes the viewer under an EXISTING, already-resolving host by PATH — the same
# pattern the parking simulation uses (host iris-ingest-dev.apcoaflow.com, a path
# prefix, backend-path-prefix "/" to strip it). This avoids needing a new DNS
# record: iris-ingest-dev.apcoaflow.com already points at the app gateway
# (20.16.69.225) and is covered by the wildcard apcoaflow-tls cert.
#
# Routing: the App Gateway sends /underscore/* here and everything else to the
# existing iris-camera-ingestion ingress (host `/` catch-all) — additive, its
# ingress is untouched. backend-path-prefix "/" strips /underscore so nginx sees
# /, /latest/..., /reports/... Visit WITH the trailing slash: /underscore/
# (per-run report links are absolute + self-contained, so they load regardless).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: underscore-viewer-iris
  labels:
    app: underscore-viewer-iris
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/backend-path-prefix: "/"
spec:
  ingressClassName: azure-application-gateway
  tls:
    - hosts:
        - iris-ingest-dev.apcoaflow.com
      secretName: apcoaflow-tls
  rules:
    - host: iris-ingest-dev.apcoaflow.com
      http:
        paths:
          - path: /iris-underscore
            pathType: Prefix
            backend:
              service:
                name: underscore-viewer-iris
                port:
                  number: 80
