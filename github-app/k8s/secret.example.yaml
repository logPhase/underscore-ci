# TEMPLATE — do NOT commit real values. Create the secret out-of-band after you
# register the GitHub App (which yields the App ID, a private key PEM, and lets
# you set a webhook secret):
#
#   kubectl create secret generic underscore-app-secrets -n iris \
#     --from-literal=GH_APP_ID='<app id>' \
#     --from-literal=GH_WEBHOOK_SECRET='<the webhook secret you set on the app>' \
#     --from-file=GH_APP_PRIVATE_KEY=<path/to/underscore.private-key.pem>
#
# Then: kubectl rollout restart deployment/underscore-app -n iris
apiVersion: v1
kind: Secret
metadata:
  name: underscore-app-secrets
  labels: { app: underscore-app }
type: Opaque
stringData:
  GH_APP_ID: "REPLACE_ME"
  GH_WEBHOOK_SECRET: "REPLACE_ME"
  GH_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_ME
    -----END RSA PRIVATE KEY-----
